<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Blog</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="blog-card">
        <div class="blog-hero">
          <img class="blog-hero__image" src="assets/hero-blog.svg" alt="Minimal personal blog illustration" />
        </div>
        <div class="blog-content-wrap">
          <p class="eyebrow">Personal Notes</p>
          <h1 class="blog-title">Welcome to my quiet corner of the web</h1>
          <p class="blog-meta">By Efe · Updated recently</p>
          <div id="blogContent" class="blog-content"></div>
        </div>
      </section>
    </main>

    <button id="editButton" class="edit-fab" type="button">Edit Blog</button>

    <div id="editorPanel" class="editor-panel hidden" role="dialog" aria-modal="true" aria-label="Blog editor">
      <div class="editor-card">
        <div class="editor-card__header">
          <div>
            <p class="editor-badge">Editing Studio</p>
            <h2>Edit your blog</h2>
          </div>
          <p class="editor-hint">Add a beautiful title, a soft subtitle, and stylish section breaks in seconds.</p>
        </div>

        <div class="editor-meta">
          <label class="editor-field">
            <span>Başlık</span>
            <input id="titleInput" class="editor-input" type="text" placeholder="Ana başlık" />
          </label>
          <label class="editor-field">
            <span>Yan başlık</span>
            <input id="subtitleInput" class="editor-input" type="text" placeholder="Kısa ifade" />
          </label>
        </div>

        <div class="editor-toolbar">
          <button type="button" class="chip-button" data-insert="## ">Alt başlık</button>
          <button type="button" class="chip-button" data-insert="### ">Mini başlık</button>
        </div>

        <label class="editor-area-label" for="editorText">Blog metni</label>
        <textarea id="editorText" spellcheck="false"></textarea>
        <div class="editor-actions">
          <button id="downloadButton" class="secondary" type="button">Download .md</button>
          <button id="saveButton" class="primary" type="button">Save</button>
          <button id="cancelButton" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>

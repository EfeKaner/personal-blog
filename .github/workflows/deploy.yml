name: Deploy static site

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        env:
          BLOG_PASSWORD: ${{ secrets.BLOG_PASSWORD }}
          BLOG_GITHUB_TOKEN: ${{ secrets.BLOG_GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os

          config = {
            'password': os.environ.get('BLOG_PASSWORD', 'quietcorner2026!'),
            'githubToken': os.environ.get('BLOG_GITHUB_TOKEN', ''),
            'repo': 'EfeKaner/personal-blog'
          }

          with open('config.js', 'w', encoding='utf-8') as handle:
            handle.write('window.__BLOG_CONFIG__ = ' + json.dumps(config, ensure_ascii=False) + ';\n')
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
